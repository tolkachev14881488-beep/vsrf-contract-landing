services:
  - type: web
    name: vsrf-contract-landing
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NOTIFY_EMAIL
        value: rodionova61@bk.ru
      - key: SMTP_HOST
        value: smtp.mail.ru
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: rodionova61@bk.ru
      - key: SMTP_FROM
        value: rodionova61@bk.ru
      - key: SMTP_USE_SSL
        value: "true"
      - key: SMTP_PASSWORD
        sync: false
      - key: WEB3FORMS_ACCESS_KEY
        sync: false
